name: Backfill Transcripts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (estimate cost only, no Whisper calls)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backfill
        env:
          CTM_AUTH: ${{ secrets.CTM_AUTH }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python transcribe_backfill.py

      - name: Commit transcripts
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_backfill_transcripts.json
          git diff --cached --quiet || git commit -m "backfill: add transcripts $(date -u +%Y-%m-%d)"
          git push
